  <button id="mute" hidden>??</button>
  <script>
    const audio = document.getElementById('drone');
    audio.muted = false;
    audio.volume = 1;
    const mute = document.getElementById('mute');
    let gamestarted = false;

    function updateButton() {}

    function loadChapter(chapter) {
      const chapterPath = `chapter${chapter}/`;
      fetch(`${chapterPath}index.html`).then(res => {
        if (!res.ok) {
          throw new Error(`Failed to load ${chapterPath}index.html`);
        }
        return res.text();
      }).then(html => {
        gamestarted = true;
        const chapterDocument = new DOMParser().parseFromString(html, 'text/html');
        let base = chapterDocument.querySelector('base');
        if (!base) {
          base = chapterDocument.createElement('base');
          chapterDocument.head.prepend(base);
        }
        base.href = new URL(chapterPath, window.location.href).href;
        document.documentElement.innerHTML = chapterDocument.documentElement.innerHTML;
        document.documentElement.querySelectorAll('script').forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      }).catch(error => {
        console.error(error);
        window.location.href = `${chapterPath}index.html`;
      });
    }

    const menumoveaudio = new Audio('audios/snd_menumove.mp3');
    const menuselectaudio = new Audio('audios/snd_select.mp3');

    function playSound(sound) {
      sound.currentTime = 0;
      const playPromise = sound.play();
      if (playPromise) {
        playPromise.catch(() => {});
      }
    }

    document.querySelectorAll('.row').forEach(row => {
      row.addEventListener('mouseenter', () => {
        if (!gamestarted) {
          playSound(menumoveaudio);
          if (selectedChapter) {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
          }
        }
      });
      row.addEventListener('click', () => {
        if (!gamestarted) {
          playSound(menuselectaudio);
        }
      });
    });

    let selectedChapter = null;
    document.addEventListener('keydown', function(event) {
      if (!gamestarted) {
      if (event.key === 'ArrowUp') {
        if (selectedChapter === null) {
          selectedChapter = 0;
          document.querySelectorAll('.row')[0].classList.add("selected");
          playSound(menumoveaudio);
        } else {
          document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
          selectedChapter--;
          if (selectedChapter < 0) {
            selectedChapter = document.querySelectorAll('.row').length - 1;
          }
          document.querySelectorAll('.row')[selectedChapter].classList.add("selected");
          playSound(menumoveaudio);
        }
      } else if (event.key === 'ArrowDown') {
        if (selectedChapter === null) {
          selectedChapter = 0;
          document.querySelectorAll('.row')[0].classList.add("selected");
          playSound(menumoveaudio);
        } else {
          if (selectedChapter+1 >= document.querySelectorAll('.row').length) {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
            selectedChapter = 0;
            document.querySelectorAll('.row')[0].classList.add("selected");
            playSound(menumoveaudio);
          } else {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
            selectedChapter++;
            document.querySelectorAll('.row')[selectedChapter].classList.add("selected");
            playSound(menumoveaudio);
          }
        }
      } else if (event.key === 'Enter') {
        if (selectedChapter !== null) {
          window.location.href = document.querySelectorAll('.row')[selectedChapter].href;
          playSound(menuselectaudio);
        }
      }
      }
    });
  </script>
